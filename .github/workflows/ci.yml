name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts" --max-warnings 0

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

      - name: E2E tests
        run: pnpm run test:e2e
